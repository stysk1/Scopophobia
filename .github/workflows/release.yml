name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build src/Scopophobia.csproj -c Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Scopophobia
          path: |
            src/bin/Release/netstandard2.1/Scopophobia.dll
            Thunderstore/BepInEx/plugins/scp096

      - name: Package Thunderstore zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: ./package.ps1

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
